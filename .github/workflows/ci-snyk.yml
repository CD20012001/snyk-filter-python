name: CI – Snyk Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-scan:
    name: Security – Snyk SCA
    uses: CD20012001/snyk-security-workflows/.github/workflows/snyk-filter.yml@main
    with:
      install-command: "pip install -r requirements.txt"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
